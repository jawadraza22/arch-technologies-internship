<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | TaskFlow Pro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo neon-blue"><i class="fas fa-layer-group"></i> TaskFlow</div>
      <nav>
        <ul class="nav-links">
          <li class="nav-item"><a href="dashboard.html" class="nav-link active"><i class="fas fa-th-large"></i> Dashboard</a></li>
          <li class="nav-item"><a href="projects.html" class="nav-link"><i class="fas fa-project-diagram"></i> Projects</a></li>
          <li class="nav-item"><a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a></li>
          <li class="nav-item" style="margin-top: auto;"><a href="#" onclick="logout()" class="nav-link" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
          <h1 id="welcomeText" style="font-size: 2rem;">Welcome Back!</h1>
          <p style="color: var(--text-secondary);">Here's your productivity overview for today.</p>
        </div>
        <button class="btn btn-primary" style="width: auto;" onclick="openNewProjectModal()">
          <i class="fas fa-plus"></i> New Project
        </button>
      </header>

      <div class="dashboard-grid">
        <div class="stat-card animate-fade">
          <div style="color: var(--primary-color); font-size: 1.5rem;"><i class="fas fa-rocket"></i></div>
          <div class="stat-value" id="activeProjects">0</div>
          <div style="color: var(--text-secondary);">Active Projects</div>
        </div>
        <div class="stat-card animate-fade">
          <div style="color: var(--secondary-color); font-size: 1.5rem;"><i class="fas fa-trophy"></i></div>
          <div class="stat-value" id="completedProjects">0</div>
          <div style="color: var(--text-secondary);">Projects Finished</div>
        </div>
        <div class="stat-card animate-fade">
          <div style="color: var(--warning-color); font-size: 1.5rem;"><i class="fas fa-clock"></i></div>
          <div class="stat-value" id="pendingTasks">0</div>
          <div style="color: var(--text-secondary);">Pending Tasks</div>
        </div>
        <div class="stat-card animate-fade">
          <div style="color: var(--secondary-color); font-size: 1.5rem;"><i class="fas fa-check-circle"></i></div>
          <div class="stat-value" id="completedTasks">0</div>
          <div style="color: var(--text-secondary);">Tasks Completed</div>
        </div>
      </div>

      <section style="margin-top: 4rem;">
        <h3 style="margin-bottom: 2rem;">Recent Projects</h3>
        <div id="projectsList" class="dashboard-grid"></div>
      </section>
    </main>
  </div>

  <!-- Project Creation Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal-content glass-premium">
      <div class="modal-header">
        <h2>Create New Project</h2>
        <p style="color: var(--text-secondary);">Define your project goals and timeline.</p>
      </div>
      <form id="projectForm">
        <div class="form-group">
          <label>Project Title</label>
          <input type="text" id="projectTitle" class="form-control-pro" placeholder="e.g. Q3 Roadmap" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="projectDesc" class="form-control-pro" rows="3" placeholder="What is this project about?"></textarea>
        </div>
        <div class="form-group">
          <label>Deadline</label>
          <input type="date" id="projectDeadline" class="form-control-pro">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-social" onclick="closeModal('projectModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" style="width: auto;">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/global.js"></script>
  <script src="../js/modals.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/animations.js"></script>
</body>
</html>
