<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TaskFlow Pro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-split">
    <!-- Visual Side -->
    <div class="auth-visual">
      <div class="auth-visual-content">
        <div class="logo neon-blue" style="font-size: 2rem; margin-bottom: 2rem;">
          <i class="fas fa-layer-group"></i> TaskFlow
        </div>
        <h2>Supercharge your team's productivity.</h2>
        <p style="color: var(--text-secondary); font-size: 1.1rem;">
          Join 10,000+ teams using TaskFlow to ship products faster and stay organized.
        </p>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="auth-card-pro animate-fade">
        <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Welcome Back</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Please enter your details to sign in.</p>

        <div class="social-auth">
          <button class="btn-social">
            <i class="fab fa-google"></i> Google
          </button>
          <button class="btn-social">
            <i class="fab fa-github"></i> GitHub
          </button>
        </div>

        <div class="divider">or continue with email</div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control-pro" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <div style="display: flex; justify-content: space-between;">
              <label for="password">Password</label>
              <a href="#" style="color: var(--primary-color); font-size: 0.8rem; text-decoration: none;">Forgot?</a>
            </div>
            <input type="password" id="password" class="form-control-pro" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Sign In to Dashboard
          </button>
        </form>

        <p style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
          Don't have an account? <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Create an account</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/animations.js"></script>
</body>
</html>
