<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Board | TaskFlow Pro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo neon-blue"><i class="fas fa-layer-group"></i> TaskFlow</div>
      <nav>
        <ul class="nav-links">
          <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
          <li class="nav-item"><a href="projects.html" class="nav-link active"><i class="fas fa-project-diagram"></i> Projects</a></li>
          <li class="nav-item"><a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a></li>
          <li class="nav-item" style="margin-top: auto;"><a href="#" onclick="logout()" class="nav-link" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <div>
          <div style="display: flex; align-items: center; gap: 1rem;">
            <h2 id="projectName">Loading Project...</h2>
            <select id="projectStatusSelect" class="form-control-pro" style="padding: 0.25rem 0.75rem; width: auto; font-size: 0.8rem; border-radius: 8px;" onchange="updateProjectStatus()">
              <option value="Planning">Planning</option>
              <option value="In Progress">In Progress</option>
              <option value="On Hold">On Hold</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
          <p id="projectDesc" style="color: var(--text-secondary);">...</p>
        </div>
        <div style="display: flex; gap: 1rem;">
          <button class="btn-complete" onclick="markProjectComplete()" title="Mark Project as Complete">
            <i class="fas fa-check-double"></i> End Project
          </button>
          <button class="btn-delete" onclick="handleDeleteProject()" title="Delete Project">
            <i class="fas fa-trash"></i>
          </button>
          <button class="btn btn-primary" style="width: auto;" onclick="openNewTaskModal()">
            <i class="fas fa-plus"></i> New Task
          </button>
        </div>
      </header>

      <div class="board">
        <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
          <div class="column-header">
            <h4>To Do</h4>
            <span class="count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column" id="inprogress" ondrop="drop(event)" ondragover="allowDrop(event)">
          <div class="column-header">
            <h4>In Progress</h4>
            <span class="count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column" id="review" ondrop="drop(event)" ondragover="allowDrop(event)">
          <div class="column-header">
            <h4>Review</h4>
            <span class="count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>

        <div class="column" id="completed" ondrop="drop(event)" ondragover="allowDrop(event)">
          <div class="column-header">
            <h4>Completed</h4>
            <span class="count">0</span>
          </div>
          <div class="tasks-container"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Task Creation Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal-content glass-premium">
      <div class="modal-header">
        <h2>Create New Task</h2>
        <p style="color: var(--text-secondary);">Assign a task to your team board.</p>
      </div>
      <form id="taskForm">
        <div class="form-group">
          <label>Task Title</label>
          <input type="text" id="taskTitle" class="form-control-pro" placeholder="e.g. Design Login Page" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="taskDesc" class="form-control-pro" rows="3" placeholder="Details about this task..."></textarea>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="taskPriority" class="form-control-pro">
            <option value="Low">Low</option>
            <option value="Medium" selected>Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="taskDueDate" class="form-control-pro">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-social" onclick="closeModal('taskModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" style="width: auto;">Add Task</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="../js/global.js"></script>
  <script src="../js/modals.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/tasks.js"></script>
  <script src="../js/animations.js"></script>
</body>
</html>
