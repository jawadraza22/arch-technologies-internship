<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | TaskFlow Pro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-split">
    <!-- Visual Side -->
    <div class="auth-visual">
      <div class="auth-visual-content">
        <div class="logo neon-purple" style="font-size: 2rem; margin-bottom: 2rem;">
          <i class="fas fa-layer-group"></i> TaskFlow
        </div>
        <h2>Build better products, together.</h2>
        <p style="color: var(--text-secondary); font-size: 1.1rem;">
          The all-in-one platform for modern teams to collaborate, track, and ship high-quality software.
        </p>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="auth-card-pro animate-fade">
        <h1 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Create Account</h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Get started with your 14-day free trial.</p>

        <div class="social-auth">
          <button class="btn-social">
            <i class="fab fa-google"></i> Google
          </button>
          <button class="btn-social">
            <i class="fab fa-github"></i> GitHub
          </button>
        </div>

        <div class="divider">or use your email</div>

        <form id="registerForm">
          <div class="form-group">
            <label for="username">Full Name</label>
            <input type="text" id="username" class="form-control-pro" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Work Email</label>
            <input type="email" id="email" class="form-control-pro" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control-pro" placeholder="Create a strong password" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
            Create Pro Account
          </button>
        </form>

        <p style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
          Already using TaskFlow? <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Sign in here</a>
        </p>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/animations.js"></script>
</body>
</html>
