<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile | TaskFlow Pro</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo neon-blue"><i class="fas fa-layer-group"></i> TaskFlow</div>
      <nav>
        <ul class="nav-links">
          <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
          <li class="nav-item"><a href="projects.html" class="nav-link"><i class="fas fa-project-diagram"></i> Projects</a></li>
          <li class="nav-item"><a href="profile.html" class="nav-link active"><i class="fas fa-user"></i> Profile</a></li>
          <li class="nav-item" style="margin-top: auto;"><a href="#" onclick="logout()" class="nav-link" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header style="margin-bottom: 3rem;">
        <h1 style="font-size: 2rem;">Profile Settings</h1>
        <p style="color: var(--text-secondary);">Manage your account preferences and personal information.</p>
      </header>

      <div class="auth-card-pro glass-premium animate-fade" style="max-width: 600px; padding: 3rem;">
        <div style="display: flex; align-items: center; gap: 2rem; margin-bottom: 3rem;">
          <div style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white;">
            <i class="fas fa-user"></i>
          </div>
          <div>
            <h2 id="profileUsername">User Name</h2>
            <p id="profileEmail" style="color: var(--text-secondary);">user@example.com</p>
          </div>
        </div>

        <form id="profileForm">
          <div class="form-group">
            <label>Display Name</label>
            <input type="text" id="editUsername" class="form-control-pro" placeholder="Enter your name">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="editEmail" class="form-control-pro" disabled>
          </div>
          <div class="form-group">
            <label>Account Role</label>
            <input type="text" id="editRole" class="form-control-pro" disabled value="Pro Member">
          </div>
          
          <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="width: auto;">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) {
        document.getElementById('profileUsername').innerText = user.username;
        document.getElementById('profileEmail').innerText = user.email;
        document.getElementById('editUsername').value = user.username;
        document.getElementById('editEmail').value = user.email;
      }
    });
  </script>
  <script src="../js/animations.js"></script>
</body>
</html>
